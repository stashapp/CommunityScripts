name: Group Details
description: Adds group-card metrics for filtered duration and average vertical resolution.
version: 0.1.27
url: https://github.com/stashapp/CommunityScripts/tree/main/plugins/GroupDetails
ui:
  javascript:
    - images.js
    - GroupDetails.js
  css:
    - GroupDetails.css
  assets:
    /144p.png: assets/144p.png
    /240p.png: assets/240p.png
    /360p.png: assets/360p.png
    /480p.png: assets/480p.png
    /720p.png: assets/720p.png
    /1080p.png: assets/1080p.png
    /2k.png: assets/2k.png
    /4k.png: assets/4k.png
    /5k.png: assets/5k.png
    /6k.png: assets/6k.png
    /8k.png: assets/8k.png
settings:
  includeAllScenes:
    displayName: Include all scenes
    description: >-
      When enabled, duration and average resolution include every scene linked to the group.
      When disabled (default), scenes are limited to those with scene_index null or 0..89 for this group,
      except when the group has only one scene (that scene is always included).
    type: BOOLEAN
