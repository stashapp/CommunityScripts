name: Metrics
description: Comprehensive library analytics dashboard with 16 tabs, plus runnable report + rename tasks.
version: 1.9.0
url: https://github.com/kangooaus/stashappgraph-
# Stash plugin manifest — see https://docs.stashapp.cc/in-app-manual/plugins/

# Stash's plugin schema requires `exec:` at the plugin level, not per task
# or hook. Every task / hook shares this launcher; the specific mode is
# passed via defaultArgs and read from stdin JSON's `args.mode` by
# backend/compute_metrics.js.
exec:
  - node
  - "{pluginDir}/backend/compute_metrics.js"

# Communication protocol between Stash and the script.
interface: raw

ui:
  # v3.0 — expose the cache directory as static assets served under
  # /plugin/Metrics/assets/<file>. The dashboard fetch()es
  # metrics-cache.json directly; no more JS bootstrap indirection.
  # NOTE: Stash already namespaces every plugin's assets under
  # /plugin/<id>/assets/ — the mapping key is matched against the path
  # AFTER that prefix is stripped, so `/` maps the whole namespace to
  # the plugin's assets/ directory. (`/assets: assets` would serve files
  # at /plugin/Metrics/assets/assets/… — a double prefix.)
  assets:
    /: assets
  javascript:
    - assets/lib/chart.umd.min.js
    - assets/lib/chartjs-plugin-datalabels.min.js
    - assets/lib/chartjs-chart-matrix.min.js
    - src/utils/format.js
    - src/utils/stats.js
    - src/utils/correlations.js
    - src/data/graphql.js
    - src/data/cache.js
    - src/data/preferences.js
    - src/charts/overview.js
    - src/charts/performers.js
    - src/charts/tags.js
    - src/charts/networks.js
    - src/charts/timeseries.js
    - src/charts/correlations.js
    - src/charts/matches.js
    - src/charts/play.js
    - src/charts/archetypes.js
    - src/charts/insights.js
    - src/charts/fantasy.js
    - src/charts/quality.js
    - src/charts/wrapped.js
    - src/charts/bingo.js
    - src/charts/tagopt.js
    - src/charts/cleanup.js
    - src/charts/files.js
    - src/dashboard.js
    - src/metrics.js
  css:
    - src/styles.css

# Settings appear under Settings → Plugins → Metrics in the Stash UI and
# are exposed to backend scripts via the PLUGIN_SETTINGS_JSON env var.
settings:
  cacheTtlMinutes:
    displayName: Cache TTL (minutes)
    description: How long computed metrics remain valid before the dashboard refetches. Default 60.
    type: NUMBER
  disableNetworkGraph:
    displayName: Disable collaboration network graph
    description: Skip the performer co-occurrence force-directed graph on slow clients. Default off.
    type: BOOLEAN
  topN:
    displayName: Top-N items per chart
    description: How many entries (performers, tags, studios) to show in ranking charts. Default 20.
    type: NUMBER
  ageBuckets:
    displayName: Age bucket size (years)
    description: Granularity of the performer age pyramid (e.g. 5 = 5-year buckets). Default 5.
    type: NUMBER
  heightUnit:
    displayName: Height unit
    description: cm or in — used for all height-related charts. Default cm.
    type: STRING
  excludeTagIds:
    displayName: Excluded tag IDs
    description: Comma-separated tag IDs to exclude from all tag aggregations. Default empty (no exclusions).
    type: STRING
  excludePerformerIds:
    displayName: Excluded performer IDs
    description: Comma-separated performer IDs to exclude from all performer aggregations. Default empty (no exclusions).
    type: STRING
  hideOtherBucket:
    displayName: Hide "Other" bucket in top-N charts
    description: Drop the tail of distributions instead of aggregating into "Other". Default off.
    type: BOOLEAN
  genderFilter:
    displayName: Gender filter
    description: Comma-separated Stash gender enum values (FEMALE, MALE, TRANSGENDER_FEMALE, TRANSGENDER_MALE, INTERSEX, NON_BINARY). Default all (no filter).
    type: STRING
  reportFormats:
    displayName: Report formats
    description: Comma-separated report formats. Any of json,csv,html. Default json,csv,html.
    type: STRING

  # ---- Correlation & recommender settings (v1.1) ---------------------------
  # Feature-flag toggles use `disable*` semantics because Stash reports
  # every untouched BOOLEAN as `false` — with `enable*` names, the plugin
  # would ship with every tab OFF on a fresh install. `disable*: true`
  # explicitly opts out of a heavy computation.
  disableCorrelations:
    displayName: Disable correlations tab
    description: Skip attribute × O-count correlation aggregates on very large libraries. Default off.
    type: BOOLEAN
  correlationMinSupport:
    displayName: Correlation min support
    description: Drop attribute cells below this sample count from correlation aggregates. Default 3.
    type: NUMBER
  preferenceProfile:
    displayName: Preference profile (JSON)
    description: JSON preference profile for the Matches tab. Default empty (no filtering). See README for the full schema.
    type: STRING
  matchMinScore:
    displayName: Match minimum score (0–100)
    description: Drop matches below this weighted score. Default 0 (keep all).
    type: NUMBER
  matchIncludeUnknown:
    displayName: Treat missing attributes as partial matches
    description: When ON, unknown-attribute matches score 0.5 × weight instead of 0. Default off.
    type: BOOLEAN

  # ---- v1.2 advanced analytics ------------------------------------------
  disablePlayHistory:
    displayName: Disable Play tab
    description: Skip the day-of-week × hour-of-day heatmap + most-watched aggregation. Default off.
    type: BOOLEAN
  disableArchetypes:
    displayName: Disable Archetypes tab
    description: Skip the O(n²) k-means clustering + cosine-similarity index on very large libraries. Default off.
    type: BOOLEAN
  archetypeClusters:
    displayName: Archetype cluster count (k)
    description: Number of performer archetype clusters to compute (2–12). Default 6.
    type: NUMBER
  disableDiversity:
    displayName: Disable diversity analytics
    description: Skip Shannon / Gini-Simpson diversity per attribute + gap analysis. Default off.
    type: BOOLEAN
  disableTemporal:
    displayName: Disable temporal analytics
    description: Skip release-year + career-timeline + tag-evolution charts on the Insights tab. Default off.
    type: BOOLEAN
  disableFantasy:
    displayName: Disable Fantasy Builder
    description: Skip reverse-engineering a preference profile from your favourites / top-rated / top-O seed set. Default off.
    type: BOOLEAN
  fantasyMode:
    displayName: Fantasy Builder seed mode
    description: How to pick the seed performers — favorites | top-rated | top-o. Default favorites.
    type: STRING
  fantasyConsensus:
    displayName: Fantasy consensus threshold
    description: Fraction of seed performers that must share a value before it's locked into the derived profile (0.3 = loose, 0.7 = strict). Default 0.5.
    type: STRING

  # ---- v1.3 quality + excel ---------------------------------------------
  enableQuality:
    displayName: Enable Quality tab
    description: Hidden gems, overrated / underrated insights and a composite library-health score. Default off.
    type: BOOLEAN
  gemRatingFloor:
    displayName: Hidden-gem rating floor
    description: Minimum rating100 a scene must have to be considered a "hidden gem". Default 80.
    type: NUMBER
  gemPlayCeiling:
    displayName: Hidden-gem play-count ceiling
    description: Maximum play_count for a scene to still qualify as a hidden gem. Default 2.
    type: NUMBER
  qualityZThreshold:
    displayName: Over/underrated z-score threshold
    description: Absolute z-score cutoff for the anomaly lists (1.0 = top ~16%). Default 1.0.
    type: STRING
  qualityMinScenes:
    displayName: Minimum scenes for performer anomalies
    description: A performer needs at least this many scenes before being eligible for the over/underrated list. Default 2.
    type: NUMBER

  # ---- v1.8 tag optimizer ------------------------------------------------
  disableTagOptimizer:
    displayName: Disable Tag Optimizer tab
    description: Skip near-duplicate detection, always-together pair analysis and hierarchy audit. Default off.
    type: BOOLEAN
  tagoptRareThreshold:
    displayName: Tag Optimizer — rare tag threshold
    description: Tags with fewer scenes than this are surfaced as "rare" cleanup candidates. Default 3.
    type: NUMBER
  tagoptPairMinSupport:
    displayName: Tag Optimizer — pair min support
    description: A tag pair needs at least this many shared scenes before it's considered for merge / specialisation detection. Default 5.
    type: NUMBER
  tagoptUndertagMax:
    displayName: Tag Optimizer — under-tagged threshold
    description: Scenes with this many tags or fewer are flagged as under-tagged. Default 2.
    type: NUMBER
  tagoptOvertagMin:
    displayName: Tag Optimizer — over-tagged threshold
    description: Scenes with this many tags or more are flagged as over-tagged (auto-tagger noise). Default 20.
    type: NUMBER
  missingTagUndertaggedMax:
    displayName: Missing-tag suggestions — undertagged threshold
    description: Only surface missing-tag suggestions for scenes carrying this many tags or fewer. Default 3.
    type: NUMBER

  # ---- v2.11 batch rename -----------------------------------------------
  renameMaxRenames:
    displayName: Rename Files — safety cap
    description: Maximum number of files renamed in a single run. Default 2000. Set high once you trust the plan.
    type: NUMBER
  renameSkipStudios:
    displayName: Rename Files — skip these studios
    description: Comma-separated studio names to NEVER rename. Default empty. Useful for studios you've already curated to a different pattern.
    type: STRING

# Runnable tasks — appear on the Tasks page under Plugin Tasks → Metrics.
# All tasks share the top-level `exec:` above; `defaultArgs.mode` is the
# only per-task distinction and is delivered to the script through
# Stash's stdin JSON payload (args.mode).
tasks:
  - name: Generate Full Metrics Report
    description: Compute full analytics + write JSON/CSV/HTML report + refresh dashboard cache.
    defaultArgs:
      mode: full-report

  - name: Update Metrics Cache
    description: Refresh the dashboard cache. Cheap — no report output.
    defaultArgs:
      mode: cache-refresh

  - name: Find Matches Based on My Preferences
    description: Score performers + scenes against the preferenceProfile and write ranked lists.
    defaultArgs:
      mode: match

  - name: Generate Year-in-Review
    description: Calendar-year summary as a standalone HTML report. Defaults to last year.
    defaultArgs:
      mode: year-review

  - name: Export Full Library to Excel
    description: Multi-sheet .xlsx workbook with all entities, junctions, correlations and quality data.
    defaultArgs:
      mode: excel-export

  - name: Rename Files — Dry Run
    description: Write a rename plan to cache/reports without touching any files.
    defaultArgs:
      mode: rename-files
      apply: "false"

  - name: Rename Files — Apply
    description: Rename files via Stash's moveFiles mutation. Scene ↔ file link preserved.
    defaultArgs:
      mode: rename-files
      apply: "true"

  - name: Rename Files — Dry Run (mismatches only)
    description: Dry Run restricted to files whose name doesn't match their scene title.
    defaultArgs:
      mode: rename-files
      apply: "false"
      onlyMismatch: "true"

  - name: Rename Files — Apply (unlimited)
    description: Apply with maxRenames=100000, bypassing the safety cap setting.
    defaultArgs:
      mode: rename-files
      apply: "true"
      maxRenames: "100000"

  - name: Rename Files — Dry Run (unlimited)
    description: Dry Run with maxRenames=100000, bypassing the safety cap setting.
    defaultArgs:
      mode: rename-files
      apply: "false"
      maxRenames: "100000"
